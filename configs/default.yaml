encoder:
  model_id: "laion/CLIP-ViT-L-14-DataComp.XL-s13B-b90K"

reconstructor:
  type: "improved"         # "basic" or "improved"
  embed_dim: 768
  base_channels: 512
  # ImprovedReconstructor specific:
  num_res_blocks: 2
  dropout: 0.0
  attention_resolutions: [7, 14]

training:
  batch_size: 32
  learning_rate: 0.0002
  weight_decay: 0.0001
  num_epochs: 50
  lambda_lpips: 0.5
  save_every: 5
  log_every: 50
  grad_clip: 1.0
  use_ema: true
  ema_decay: 0.999

# Phase 2 & 3: Occlusion analysis and candidate screening
analyzer:
  patch_size: 56           # ViT-L/14 natural patch = 14, use 16 for clean division
  occlusion_mode: "mean"   # "mean", "zero", "blur"
  loss_fn: "l1"            # "l1", "l2", "l1+l2"
  batch_size: 64
  top_m_ratio: 0.3         # Phase 3: fraction of patches as candidates
  top_k_ratio: 0.45        # Phase 5: fraction of total patches to protect
  center_prior_weight: 0.3 # spatial prior blend (0=off, 1=full prior)
  center_prior_sigma: 0.4  # Gaussian spread (smaller=tighter to center)

# Phase 4: VLM semantic privacy judgment
vlm:
  backend: "mock"          # "mock" for testing, "qwen" for DashScope Qwen-VL
  model: "qwen3.5-plus"   # DashScope model name (used when backend=qwen)
  # api_key: null          # set via DASHSCOPE_API_KEY env var (recommended)
  max_retries: 3           # API call retry count
  default_score: 0.5       # MockVLMJudge default (override with real VLM)
  default_action: "noise"  # default protection action
  context_margin: 1        # extra patches around target for context

# Phase 5: Score fusion
fusion:
  alpha: 1.0               # weight for reconstruction sensitivity
  beta: 1.0                # weight for semantic privacy
  mode: "multiplicative"   # "multiplicative" or "linear"

# Phase 6: Adaptive protection
protector:
  epsilon_min: 0.05        # minimum protection strength
  epsilon_scale: 0.30      # score-based strength scaling
  blur_kernel_size: 7
  mosaic_block: 4
